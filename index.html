<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spin Escape - Max Revenue</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            touch-action: none; position: fixed; width: 100%; 
        }
        
        /* 上部広告：100px固定 */
        #ad-top-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100px; 
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }

        /* ゲームエリア */
        #game-area { 
            position: absolute; top: 100px; bottom: 0; left: 0; right: 0; 
            background: #050505; overflow: hidden; z-index: 10;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #00ff00; font-size: 36px; font-weight: bold; pointer-events: none; 
            z-index: 20; text-shadow: 0 0 10px rgba(0,255,0,0.8); 
        }

        /* メニュー/リザルト画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; padding: 10px;
        }

        /* リザルト用 300x250 広告枠 */
        #ad-middle-box {
            width: 300px; height: 250px; background: #111; margin: 15px 0;
            display: none; justify-content: center; align-items: center; 
            border-radius: 12px; overflow: hidden; border: 1px solid #333;
        }

        /* 5秒全画面広告 */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 330px; background: #fff; position: relative; border-radius: 8px; }
        #close-ad-btn { position: absolute; top: -50px; right: 0px; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer; }

        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        .menu-btn { width: 260px; padding: 16px; font-size: 18px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #goButton { background: #ff4757; box-shadow: 0 4px #b3323d; }
        #goButton:disabled { background: #333; box-shadow: none; color: #666; cursor: default; }
        .link-btn { background: #5352ed; box-shadow: 0 4px #3736af; }
    </style>
</head>
<body>
    <div id="ad-top-container">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-area">
        <div id="ui">0</div>
        
        <div id="menuScreen">
            <div style="text-align:center;">
                <h2 id="menuTitle" style="color:#ff4757; margin:0; font-size: 32px; letter-spacing: 2px;">SPIN ESCAPE</h2>
                <p id="menuMsg" style="margin:5px 0; color: #aaa;">タップして回転！隙間を抜けろ</p>
            </div>

            <div id="ad-middle-box">
                <ins class="adsbygoogle"
                     style="display:inline-block;width:300px;height:250px"
                     data-ad-client="ca-pub-1299640300068792"
                     data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="btn-group">
                <button id="goButton" class="menu-btn">START!</button>
                <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他のゲーム</a>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="inter-screen">
        <div class="inter-content">
            <div id="close-ad-btn" onclick="closeInterAd()">5</div>
            <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:8px; background: #fff;"></iframe>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"), ui = document.getElementById("ui"), menuScreen = document.getElementById("menuScreen"), menuTitle = document.getElementById("menuTitle"), menuMsg = document.getElementById("menuMsg"), goButton = document.getElementById("goButton"), adMid = document.getElementById("ad-middle-box");
        
        let score = 0, gameActive = false, angle = 0, rotating = false, obstacles = [], speed = 3.5, playCount = 0;
        let spawnTimer;

        function resize() { 
            const area = document.getElementById("game-area");
            canvas.width = area.clientWidth; 
            canvas.height = area.clientHeight; 
        }
        window.addEventListener('resize', resize);
        resize();

        goButton.onclick = () => {
            menuScreen.style.display = "none"; adMid.style.display = "none";
            gameActive = true; score = 0; angle = 0; obstacles = []; speed = 3.5;
            ui.innerText = "0";
            spawnObstacle();
            update();
        };

        window.addEventListener("pointerdown", (e) => { if(gameActive && e.target === canvas) rotating = true; });
        window.addEventListener("pointerup", () => { rotating = false; });

        function spawnObstacle() {
            if(!gameActive) return;
            const gap = 120 - Math.min(40, score);
            const gapPos = Math.random() * (canvas.width - gap);
            obstacles.push({ y: -50, gapX: gapPos, gapW: gap });
            const nextSpawn = Math.max(450, 1400 - (score * 25));
            spawnTimer = setTimeout(spawnObstacle, nextSpawn);
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(rotating) angle += 0.09;
            else angle += 0.02; // 離していても少しずつ回るようにすると難易度が上がる
            
            const px = canvas.width / 2, py = canvas.height / 2;
            const ox = canvas.width * 0.38, oy = canvas.height * 0.22;
            const sx = px + Math.cos(angle) * ox, sy = py + Math.sin(angle) * oy;

            // ネオン自機
            ctx.shadowBlur = 15; ctx.shadowColor = "#00ff00";
            ctx.fillStyle = "#00ff00";
            ctx.beginPath(); ctx.arc(sx, sy, 13, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            for(let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                ob.y += speed;
                
                ctx.fillStyle = "#ff4757";
                ctx.fillRect(0, ob.y, ob.gapX, 28);
                ctx.fillRect(ob.gapX + ob.gapW, ob.y, canvas.width, 28);

                // 当たり判定
                if(sy > ob.y && sy < ob.y + 28) {
                    if(sx < ob.gapX || sx > ob.gapX + ob.gapW) {
                        gameOver(); return;
                    }
                }

                if(ob.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++; ui.innerText = score;
                    speed += 0.05;
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            playCount++;
            clearTimeout(spawnTimer);

            menuTitle.innerText = "GAME OVER";
            menuTitle.style.color = "#ff4757";
            menuMsg.innerText = "SCORE: " + score;
            
            goButton.innerText = "お待ちください...";
            goButton.disabled = true;
            adMid.style.display = "flex";
            menuScreen.style.display = "flex";

            setTimeout(() => {
                goButton.disabled = false;
                goButton.innerText = "RETRY";
            }, 1500);

            // 【2-5-8 収益サイクル】
            if (playCount === 2 || (playCount >= 5 && (playCount - 2) % 3 === 0)) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timer = 5;
            closeBtn.innerText = timer; closeBtn.style.pointerEvents = "none"; closeBtn.style.background = "#555";
            const countdown = setInterval(() => {
                timer--;
                if (timer > 0) closeBtn.innerText = timer;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.background = "#ff4444";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }
    </script>
</body>
</html>
