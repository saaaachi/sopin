<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* 画面全体の設定 */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #333; 
            display: flex; 
            justify-content: center; /* 左右中央 */
            align-items: center;     /* 上下中央 */
            width: 100vw; 
            height: 100vh; 
        }

        /* 広告を入れる箱の設定 */
        #ad-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* i-mobileが自動生成するタグも強制的に中央へ */
        #ad-container div {
            margin: 0 auto !important;
            display: flex !important;
            justify-content: center !important;
        }
    </style>
</head>
<body>
    <div id="ad-container"></div>

    <script>
        // さちさんが用意してくれた6個のスポット情報
        const spots = {
            top: [
                { asid: "1924119", eid: "im-8cc28fd9f87544109527221fec95deb6", time: 20000 },   // 20秒
                { asid: "1925184", eid: "im-ef1987f1ff4d40d2a27093f8829bced4", time: 21000 },   // 21秒
                { asid: "1925185", eid: "im-9c8411bf82604183ab841a1237717a27", time: 20500 }    // 20.5秒
            ],
            bottom: [
                { asid: "1924120", eid: "im-794f0541642c4448a818b376f2a1f96c", time: 20000 },   // 20秒
                { asid: "1925186", eid: "im-a0c3a54f607341e889079b747c113843", time: 21000 },   // 21秒
                { asid: "1925187", eid: "im-0caf842acd76487c9865130ce8b38bd5", time: 20500 }    // 20.5秒
            ]
        };

        // URLから「上(top)か下(bottom)か」を判断
        const urlParams = new URLSearchParams(window.location.search);
        const pos = urlParams.get('pos') === 'bottom' ? 'bottom' : 'top';
        let currentIndex = 0;

        function showAd() {
            const container = document.getElementById('ad-container');
            const spot = spots[pos][currentIndex];
            
            // 前の広告を消して、新しい箱を作る
            container.innerHTML = `<div id="${spot.eid}"></div>`;
            
            // i-mobileのスクリプトを読み込む
            const scriptTag = document.createElement('script');
            scriptTag.src = "https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104";
            scriptTag.async = true;
            container.appendChild(scriptTag);

            // 広告を表示する設定を実行
            const configTag = document.createElement('script');
            configTag.innerHTML = `(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:${spot.asid},type:"banner",display:"inline",elementid:"${spot.eid}"})`;
            container.appendChild(configTag);

            // 指定されたバラバラの秒数後に、次の広告へ切り替え
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % spots[pos].length;
                showAd();
            }, spot.time);
        }

        // 実行！
        showAd();
    </script>
</body>
</html>
